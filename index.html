<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingNineMM - Official Links</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        /* ဗီဒီယိုနောက်ခံ */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* လေးထောင့်ကွက်ကို ကြီးအောင် ပြင်ထားသည့်နေရာ */
        .container {
            width: 95%; /* ဆိုဒ်ကို ပိုကျယ်အောင် လုပ်ထားသည် */
            max-width: 500px; /* အကျယ်ဆုံး 500px အထိ ကြီးအောင် လုပ်ထားသည် */
            background: rgba(0, 0, 0, 0.7); /* နောက်ခံကို ပိုမှောင်ပြီး စာသား ပိုကြည်အောင် လုပ်ထားသည် */
            padding: 50px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { font-size: 28px; margin: 10px 0; color: #FFD700; }
        p { font-size: 16px; margin-bottom: 35px; color: #f0f0f0; }

        /* ခလုတ်များကို ပိုကြီးပြီး ရှင်းအောင် လုပ်ထားသည် */
        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px; /* ခလုတ်ကို လေးထောင့်ဆန်ဆန် ပိုကြီးအောင် လုပ်ထားသည် */
            padding: 15px 20px;
            margin-bottom: 18px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .link-card:hover { 
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            border-color: #FFD700;
        }

        .icon { width: 35px; height: 35px; margin-right: 15px; }
        .link-text { flex-grow: 1; font-weight: bold; font-size: 17px; text-align: left; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="202602251035 (3) (1).mp4" type="video/mp4">
    </video>

    <div class="container">
        <img src="https://t.me/i/userpic/320/king9mm_bot.jpg" alt="King9MM" class="profile-pic">
        
        <h1>KingNineMM</h1>
        <p>🥰 ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့ King9MM မှာ ကံထူးပါ 🥰</p>

        <a href="https://m.me/YOUR_PAGE" class="link-card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968771.png" class="icon">
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/king9mm_bot" class="link-card">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_CHANNEL" class="link-card">
            <img src="https://t.me/i/userpic/320/king9mm_bot.jpg" class="icon" style="border-radius: 50%;">
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>

</body>
</html>
