<!DOCTYPE html>
<html lang="my">
<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* ဗီဒီယိုနောက်ခံအတွက် Style */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        .container {
            width: 120%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.5); /* စာသားကြည်လင်စေရန် Background ကို အနည်းငယ် မှောင်ပေးထားသည် */
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* ပိုလှအောင် Background ကို ဝါးပေးထားသည် */
            z-index: 1;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid gold;
            margin-bottom: 15px;
            object-fit: cover;
            /* Animation ထည့်သွင်းခြင်း */
            animation: bounce 2s infinite ease-in-out;
        }

        /* လှုပ်ရှားမှု ပုံစံ သတ်မှတ်ခြင်း */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* KingNineMM ဖောင့်စတိုင် ပြင်ဆင်ထားသည့်အပိုင်း */
        h1 { 
            font-family: 'Kanit', sans-serif; 
            font-size: 40px; 
            margin: 10px 0; 
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #FFD700 22%, #FFFACD 25%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        p { font-size: 17px; color: #FFD700; margin-bottom: 30px; line-height: 1.5; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .link-card:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: scale(1.02);
        }

        .icon { width: 30px; height: 30px; margin-right: 15px; }
        .link-text { flex-grow: 1; font-weight: bold; font-size: 15px; }
    </style>
</head>

        </a>

        <a href="viber://chat?number=%2B959686204425" class="link-card">

       <span class="link-text">Viber ဆက်သွယ်ရန်</span>
       </a>

        <a href="https://t.me/K9MM99" class="link-card">
