<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingNineMM - Contact</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #5d2545; /* ပုံထဲက နောက်ခံအရောင် */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 20px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid gold;
            margin-bottom: 15px;
        }
        h1 { font-size: 22px; margin: 10px 0; }
        p { font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .link-card {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .link-card:hover { background: rgba(255, 255, 255, 0.1); }
        .icon { width: 30px; height: 30px; margin-right: 15px; }
        .link-text { flex-grow: 1; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://t.me/i/userpic/320/king9mm_bot.jpg" alt="King9MM" class="profile-pic">
    
    <h1>KingNineMM</h1>
    <p>🥰 ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့ King9MM မှာ ကံထူးပါ 🥰</p>

    <a href="https://m.me/YOUR_PAGE" class="link-card">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968771.png" class="icon">
        <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
    </a>

    <a href="viber://chat?number=YOUR_NUMBER" class="link-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3670/3670059.png" class="icon">
        <span class="link-text">Viber ဆက်သွယ်ရန်</span>
    </a>

    <a href="https://t.me/king9mm_bot" class="link-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="icon">
        <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
    </a>

    <a href="https://t.me/YOUR_CHANNEL" class="link-card">
        <img src="https://t.me/i/userpic/320/king9mm_bot.jpg" class="icon" style="border-radius: 50%;">
        <span class="link-text">Telegram Tip Game Channel</span>
    </a>
</div>

</body>
</html>
